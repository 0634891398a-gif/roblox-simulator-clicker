```ini
[General]
; General settings for the Auto Clicker
enabled = true                  ; Set to true to enable the auto clicker
click_interval = 0.1           ; Time in seconds between each click (adjust based on game requirements)
max_clicks = 1000              ; The maximum number of clicks to perform (0 for infinite)

[Hotkeys]
; Customizable hotkeys for operations in Roblox
toggle_click = F9              ; Hotkey to toggle the auto clicker on/off
increase_speed = F10           ; Hotkey to increase click speed
decrease_speed = F11           ; Hotkey to decrease click speed
reset_clicks = F12             ; Hotkey to reset the click count

[Features]
; Enable or disable specific features of the Auto Clicker
randomize_position = false      ; If true, clicks will be randomized within a small area
click_with_aim = true           ; If true, click directly on the target position
support_auto_tool = true        ; Automatically use the selected tool in Roblox when clicking

[Display]
; Display settings for the on-screen info
show_click_count = true         ; Show the current click count on the screen
display_position = top-left      ; Position of the click count display on the screen
font_size = 14                  ; Font size for the display text
font_color = #FFFFFF            ; Font color in hexadecimal format (White)
```